name: Telegram bot tick

# Розклад тригерить розсилку справ. Поточні слоти: 10/13/16/19 за Києвом = 7/10/13/16 UTC у літній час.
# Якщо у вас зимовий час (Київ UTC+2) — підставте 8/11/14/17 UTC, або відкоригуйте під свій timezone.
# Cron у GitHub Actions працює тільки в UTC.

on:
  schedule:
    # Розсилка справ — 4 рази на день. ЦЕ НЕ ЗМІНЮЄМО (інакше юзери отримуватимуть
    # справи частіше, ніж задумано). Літній час (UTC+3): 10/13/16/19 Kyiv = 7/10/13/16 UTC.
    - cron: '0 7,10,13,16 * * *'
    # Cleanup протермінованих сесій — раз на годину.
    - cron: '15 * * * *'
    # Group-tick (морнінг/вечір) — 4 рази на годину для відмовостійкості.
    # GH Actions schedule на free-tier часто «гасить» окремі слоти. Сервер ідемпотентний
    # через bot_meta claim — повторні виклики просто повертають 'already-sent'.
    # Кожен виклик у НЕ-цільову годину одразу повертає 'skip' (CPU ~0).
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch: {}

jobs:
  dispatch:
    if: github.event.schedule == '0 7,10,13,16 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dispatch
        env:
          BASE_URL_RAW: ${{ secrets.TELEGRAM_BASE_URL }}
          SECRET_RAW: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          # Чистимо CR/LF/пробіли — частий випадок коли в GitHub Secret потрапив \n при копіюванні.
          BASE_URL=$(printf '%s' "$BASE_URL_RAW" | tr -d '\r\n\t ' )
          SECRET=$(printf '%s' "$SECRET_RAW" | tr -d '\r\n\t ' )

          # Діагностика — без секретів, але корисна.
          echo "BASE_URL_RAW length: ${#BASE_URL_RAW} (after trim: ${#BASE_URL})"
          echo "SECRET_RAW length:   ${#SECRET_RAW} (after trim: ${#SECRET})"

          if [ -z "$BASE_URL" ]; then echo "::error::TELEGRAM_BASE_URL is empty"; exit 1; fi
          if [ -z "$SECRET" ];   then echo "::error::TELEGRAM_CRON_SECRET is empty"; exit 1; fi
          case "$BASE_URL" in
            https://*) ;;
            *) echo "::error::TELEGRAM_BASE_URL must start with https://"; exit 1 ;;
          esac

          host="${BASE_URL#https://}"
          host="${host%%/*}"
          echo "GET target: https://$host/api/telegram/cron/tick"

          URL="${BASE_URL%/}/api/telegram/cron/tick?secret=$SECRET"

          # Тік поновлюваний: сервер обробляє чанк юзерів (~40 с бюджету) і повертає
          # status 'partial' (є ще юзери) | 'done' (раунд завершено) | 'busy' (чанк
          # вже виконується деінде). Викликаємо в циклі до 'done'. Стан раунду —
          # в bot_meta, тож обрив джоба посеред циклу не губить прогрес: повторний
          # запуск продовжить з курсора (а завершений <1 год тому раунд не
          # передублюється — сервер відповість done/recent-round).
          MAX_ATTEMPTS=15
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            if ! RESP=$(curl -fsS --max-time 90 "$URL"); then
              echo "attempt $i/$MAX_ATTEMPTS: curl failed, retry in 10s"
              sleep 10
              continue
            fi
            # `|| true` — щоб не-JSON відповідь не вбила степ (bash -e).
            STATUS=$(printf '%s' "$RESP" | jq -r '.status // empty' 2>/dev/null || true)
            PROGRESS=$(printf '%s' "$RESP" | jq -c '{chunkProcessed, remaining, stats} | with_entries(select(.value != null))' 2>/dev/null || true)
            echo "attempt $i/$MAX_ATTEMPTS: status=$STATUS $PROGRESS"
            if [ "$STATUS" = "done" ]; then
              echo "Dispatch round complete."
              exit 0
            fi
            # busy — інший чанк ще працює (напр., ліза попереднього виклику): чекаємо довше.
            if [ "$STATUS" = "busy" ]; then sleep 20; else sleep 3; fi
          done
          echo "::error::Dispatch round not finished after $MAX_ATTEMPTS attempts"
          exit 1

  cleanup:
    if: github.event.schedule == '15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup
        env:
          BASE_URL_RAW: ${{ secrets.TELEGRAM_BASE_URL }}
          SECRET_RAW: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          BASE_URL=$(printf '%s' "$BASE_URL_RAW" | tr -d '\r\n\t ' )
          SECRET=$(printf '%s' "$SECRET_RAW" | tr -d '\r\n\t ' )
          [ -n "$BASE_URL" ] || { echo "::error::TELEGRAM_BASE_URL missing"; exit 1; }
          [ -n "$SECRET" ]   || { echo "::error::TELEGRAM_CRON_SECRET missing"; exit 1; }
          URL="${BASE_URL%/}/api/telegram/cron/cleanup?secret=$SECRET"
          curl -fsS --max-time 60 "$URL"

  group-tick:
    # 4 рази на годину (HH:05, HH:20, HH:35, HH:50). Сервер сам перевіряє київську
    # годину і вирішує: морнінг (10–11), вечір (21–22) чи скіп. Дедуплікація — bot_meta.
    # 22 години доби це миттєвий 'skip' (без БД-роботи). 2 години (морнінг+вечір) —
    # до 8 спроб, перша успішна заклеймить, решта повернуть 'already-sent'.
    if: github.event.schedule == '5,20,35,50 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger group-tick (morning/evening router)
        env:
          BASE_URL_RAW: ${{ secrets.TELEGRAM_BASE_URL }}
          SECRET_RAW: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          BASE_URL=$(printf '%s' "$BASE_URL_RAW" | tr -d '\r\n\t ' )
          SECRET=$(printf '%s' "$SECRET_RAW" | tr -d '\r\n\t ' )
          [ -n "$BASE_URL" ] || { echo "::error::TELEGRAM_BASE_URL missing"; exit 1; }
          [ -n "$SECRET" ]   || { echo "::error::TELEGRAM_CRON_SECRET missing"; exit 1; }
          URL="${BASE_URL%/}/api/telegram/cron/group-tick?secret=$SECRET"
          curl -fsS --max-time 60 "$URL"
