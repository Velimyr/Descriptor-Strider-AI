name: Telegram bot tick

# Розклад тригерить розсилку справ. Розклад UTC: 10/13/16/19/22 за Києвом = 7/10/13/16/19 UTC.
# Якщо у вас зимовий час (Київ UTC+2) — підставте 8/11/14/17/20 UTC, або відкоригуйте під свій timezone.
# Cron у GitHub Actions працює тільки в UTC.

on:
  schedule:
    # літній час (UTC+3): 10/13/16/19 Kyiv = 7/10/13/16 UTC
    - cron: '0 7,10,13,16 * * *'
    # cleanup протермінованих сесій — раз на годину
    - cron: '15 * * * *'
  workflow_dispatch: {}

jobs:
  dispatch:
    if: github.event.schedule == '0 7,10,13,16 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          BASE_URL: ${{ secrets.TELEGRAM_BASE_URL }}
          SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::TELEGRAM_BASE_URL secret is empty or missing"
            exit 1
          fi
          if [ -z "$SECRET" ]; then
            echo "::error::TELEGRAM_CRON_SECRET secret is empty or missing"
            exit 1
          fi
          case "$BASE_URL" in
            https://*) ;;
            *) echo "::error::TELEGRAM_BASE_URL must start with https:// (got: ${BASE_URL%%:*}://...)"; exit 1 ;;
          esac
          # Friendly preview (host only, secrets hidden)
          host="${BASE_URL#https://}"
          host="${host%%/*}"
          echo "OK: will hit https://$host/api/telegram/cron/tick"

      - name: Trigger dispatch
        env:
          BASE_URL: ${{ secrets.TELEGRAM_BASE_URL }}
          SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          # Прибираємо trailing slash
          URL="${BASE_URL%/}/api/telegram/cron/tick?secret=$SECRET"
          # -f: fail on HTTP errors, -sS: silent + show errors, --max-time 60
          curl -fsS --max-time 60 "$URL"

  cleanup:
    if: github.event.schedule == '15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          BASE_URL: ${{ secrets.TELEGRAM_BASE_URL }}
          SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          [ -n "$BASE_URL" ] || { echo "::error::TELEGRAM_BASE_URL missing"; exit 1; }
          [ -n "$SECRET" ]   || { echo "::error::TELEGRAM_CRON_SECRET missing"; exit 1; }

      - name: Trigger cleanup
        env:
          BASE_URL: ${{ secrets.TELEGRAM_BASE_URL }}
          SECRET: ${{ secrets.TELEGRAM_CRON_SECRET }}
        run: |
          URL="${BASE_URL%/}/api/telegram/cron/cleanup?secret=$SECRET"
          curl -fsS --max-time 60 "$URL"
